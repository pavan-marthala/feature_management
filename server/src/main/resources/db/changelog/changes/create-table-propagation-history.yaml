databaseChangeLog:
  - changeSet:
      id: propagation-history-1
      author: pavan
      changes:
        - createTable:
            tableName: propagation_history
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: feature_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: source_environment_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: target_environment_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: promoted_by
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: completed_at
                  type: TIMESTAMP
