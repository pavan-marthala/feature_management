databaseChangeLog:
  - changeSet:
      id: stage-1
      author: pavan
      changes:
        - createTable:
            tableName: stage
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_stage_workflow
                    referencedTableName: workflow
                    referencedColumnNames: id
              - column:
                  name: environment_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_stage_environment
                    referencedTableName: environment
                    referencedColumnNames: id
              - column:
                  name: order_index
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: next_stage_id
                  type: UUID
              - column:
                  name: schedule_expression
                  type: VARCHAR(255)
        - addForeignKeyConstraint:
            baseTableName: stage
            baseColumnNames: next_stage_id
            referencedTableName: stage
            referencedColumnNames: id
            constraintName: fk_stage_next
