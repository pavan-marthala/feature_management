databaseChangeLog:
  - changeSet:
      id: feature-env-mapping-1
      author: pavan
      changes:
        - createTable:
            tableName: feature_environment_mapping
            columns:
              - column:
                  name: feature_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: environment_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: feature_environment_mapping
            columnNames: feature_id, environment_id
            constraintName: pk_feature_environment_mapping
        - addForeignKeyConstraint:
            baseTableName: feature_environment_mapping
            baseColumnNames: feature_id
            referencedTableName: feature
            referencedColumnNames: id
            constraintName: fk_mapping_feature
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: feature_environment_mapping
            baseColumnNames: environment_id
            referencedTableName: environment
            referencedColumnNames: id
            constraintName: fk_mapping_environment
            onDelete: CASCADE
