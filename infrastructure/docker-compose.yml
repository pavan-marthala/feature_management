
services:
  postgres:
    image: postgres:16
    container_name: feature_management_db
    environment:
      POSTGRES_DB: feature_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: feature_management_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fm-network
  api:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: feature-api
    environment:
      - db_host=postgres
      - db_user=postgres
      - db_password=feature_management_db
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - fm-network

  ui:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.ui
      args:
        VITE_API_BASE_URL: /api/
    container_name: feature-ui
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - fm-network

volumes:
  postgres_data:

networks:
  fm-network:
    driver: bridge
